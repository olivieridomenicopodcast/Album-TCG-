<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ruota del Sorteggio</title>
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#150f0a">
<script src="./theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#150f0a;
    --leather:#2a1d14;
    --leather-light:#3a2a1b;
    --brass:#c9a24b;
    --brass-bright:#e8c873;
    --brass-dark:#8c6c2d;
    --sleeve:rgba(255,255,255,0.045);
    --sleeve-border:rgba(232,220,192,0.16);
    --parchment:#e8dcc0;
    --ink:#f1e9d8;
    --ink-dim:#c9bda3;
    --danger:#a24a3c;
    --danger-bright:#c65e4e;
    --win:#5c8a4a;
    --win-bright:#7ab86a;
  }
  html[data-theme="light"]{
    --void:#faf5ea;
    --leather:#cdb98f;
    --leather-light:#ddc9a0;
    --brass:#a97a2e;
    --brass-bright:#8a5a1e;
    --brass-dark:#6e4718;
    --sleeve:rgba(0,0,0,0.035);
    --sleeve-border:rgba(60,40,20,0.18);
    --parchment:#fffaf0;
    --ink:#2a1d14;
    --ink-dim:#6b5844;
    --danger:#b0453a;
    --danger-bright:#96382e;
    --win:#4a7a3a;
    --win-bright:#3a6a2e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, var(--leather-light) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 110%, var(--leather) 0%, transparent 50%),
      var(--void);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    transition:background .2s ease, color .2s ease;
  }
  .brand-title{ font-family:'Cinzel', serif; letter-spacing:0.08em; }

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 10px;
    max-width:900px;margin:0 auto;
  }
  header h1{
    font-size:20px;margin:0;font-weight:700;color:var(--brass-bright);
    text-shadow:0 1px 0 rgba(0,0,0,0.6);
  }
  .header-actions{ display:flex;align-items:center;gap:8px; }
  .theme-toggle{
    background:var(--leather-light);
    border:1px solid var(--sleeve-border);
    color:var(--ink);
    width:34px;height:34px;border-radius:50%;
    font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }

  .app-nav{
    max-width:900px;margin:0 auto;
    display:flex;gap:8px;justify-content:center;
    padding:0 18px 14px;
  }
  .nav-pill{
    text-decoration:none;
    font-family:'Space Grotesk', sans-serif;
    font-size:12.5px;font-weight:600;
    color:var(--ink-dim);
    background:rgba(0,0,0,0.18);
    border:1px solid var(--sleeve-border);
    padding:6px 16px;border-radius:20px;
  }
  html[data-theme="light"] .nav-pill{ background:rgba(0,0,0,0.05); }
  .nav-pill.active{ color:var(--void); background:var(--brass); border-color:var(--brass); }

  .wrap{ max-width:700px; margin:0 auto; padding:0 16px 50px; }

  /* ---------- Wheel ---------- */
  .wheel-panel{
    background:linear-gradient(155deg, var(--leather-light) 0%, var(--leather) 55%, #1f150e 100%);
    border-radius:18px;
    border:1px solid #0f0a06;
    box-shadow:0 20px 40px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    padding:26px 16px 22px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  html[data-theme="light"] .wheel-panel{
    box-shadow:0 20px 40px -12px rgba(60,40,20,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .wheel-stage{
    position:relative;
    width:min(78vw, 320px);
    aspect-ratio:1/1;
  }
  .wheel-stage canvas{
    width:100%;height:100%;
    display:block;
    border-radius:50%;
    filter:drop-shadow(0 10px 24px rgba(0,0,0,0.5));
  }
  .pointer{
    position:absolute;top:-6px;left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:26px solid var(--brass-bright);
    filter:drop-shadow(0 3px 3px rgba(0,0,0,0.5));
    z-index:3;
  }
  .spin-btn{
    font-family:'Cinzel', serif;
    font-size:15px;font-weight:700;letter-spacing:0.06em;
    background:radial-gradient(circle at 35% 30%, var(--brass-bright), var(--brass) 55%, var(--brass-dark) 100%);
    color:#241a10;
    border:none;border-radius:24px;
    padding:12px 34px;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,0.4);
  }
  .spin-btn:disabled{ opacity:0.5; cursor:default; }
  .spin-btn:active:not(:disabled){ transform:scale(0.97); }

  /* ---------- Add controls ---------- */
  .add-section{
    margin-top:18px;
    background:var(--sleeve);
    border:1px solid var(--sleeve-border);
    border-radius:14px;
    padding:14px;
  }
  .section-title{
    font-family:'Cinzel', serif;
    font-size:13px;letter-spacing:0.08em;
    color:var(--brass-bright);
    margin:0 0 10px;
  }
  .add-row{ display:flex;gap:8px;margin-bottom:10px; flex-wrap:wrap; }
  .add-row:last-child{ margin-bottom:0; }
  input[type=text].field, textarea.field{
    flex:1;min-width:140px;
    background:rgba(0,0,0,0.22);
    border:1px solid var(--sleeve-border);
    border-radius:8px;
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    padding:9px 11px;
  }
  html[data-theme="light"] input[type=text].field,
  html[data-theme="light"] textarea.field{ background:rgba(0,0,0,0.05); }
  textarea.field{ min-height:70px; resize:vertical; width:100%; }
  .btn{
    font-family:'Space Grotesk', sans-serif;
    font-size:12.5px;font-weight:600;
    background:var(--leather-light);
    border:1px solid var(--sleeve-border);
    color:var(--ink);
    padding:9px 14px;border-radius:8px;
    cursor:pointer;white-space:nowrap;
  }
  .btn.gold{ background:var(--brass); color:var(--void); border-color:var(--brass); }
  .btn.danger{ background:transparent; color:var(--danger-bright); border-color:var(--danger); }
  .file-label{
    display:inline-flex;align-items:center;
    font-size:12.5px;font-weight:600;
    background:var(--leather-light);
    border:1px solid var(--sleeve-border);
    color:var(--ink);
    padding:9px 14px;border-radius:8px;
    cursor:pointer;
  }
  input[type=file]{ display:none; }

  /* ---------- Lists ---------- */
  .lists{ display:flex;gap:14px;margin-top:18px;flex-wrap:wrap; }
  .list-panel{
    flex:1;min-width:260px;
    background:var(--sleeve);
    border:1px solid var(--sleeve-border);
    border-radius:14px;
    padding:14px;
  }
  .list-panel-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10px;
  }
  .list-panel-head h3{
    font-family:'Cinzel', serif;font-size:13px;letter-spacing:0.06em;
    margin:0;color:var(--brass-bright);
  }
  .list-panel-head .count{ font-size:11px; color:var(--ink-dim); }
  .list-items{
    display:flex;flex-direction:column;gap:6px;
    max-height:260px;overflow-y:auto;
  }
  .list-item{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(0,0,0,0.18);
    border:1px solid var(--sleeve-border);
    border-radius:8px;
    padding:7px 10px;
    font-size:13px;
  }
  html[data-theme="light"] .list-item{ background:rgba(0,0,0,0.04); }
  .list-item span{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .list-item .x{
    color:var(--danger-bright);
    cursor:pointer;font-size:13px;
    padding:0 2px;flex-shrink:0;margin-left:8px;
  }
  .empty-hint{ font-size:12px;color:var(--ink-dim);opacity:0.7;padding:6px 2px; }
  .drawn .list-item{ border-left:3px solid var(--win-bright); }

  /* ---------- Winner overlay ---------- */
  .winner-overlay{
    position:fixed;inset:0;background:rgba(8,5,3,0.92);
    display:none;align-items:center;justify-content:center;
    z-index:70;backdrop-filter:blur(3px);
  }
  .winner-overlay.open{ display:flex; }
  .winner-card{
    background:var(--parchment);
    color:#241a10;
    border-radius:16px;
    padding:32px 28px;
    text-align:center;
    max-width:320px;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
  }
  .winner-card .tag{
    font-family:'Cinzel', serif;font-size:12px;letter-spacing:0.15em;
    color:var(--brass-dark); margin-bottom:8px;
  }
  .winner-card .name{
    font-family:'Cinzel', serif;font-size:22px;font-weight:700;
    margin:6px 0 20px; word-break:break-word;
  }
  .winner-card .btn{ background:var(--brass); color:#241a10; border-color:var(--brass); }

  @media (max-width:480px){
    header h1{ font-size:17px; }
  }
</style>
</head>
<body>

<header>
  <h1 class="brand-title">🎡 Ruota</h1>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle" title="Cambia tema">🌙</button>
  </div>
</header>

<nav class="app-nav">
  <a href="./index.html" class="nav-pill">📖 Raccoglitore</a>
  <a href="./ruota.html" class="nav-pill active">🎡 Ruota</a>
</nav>

<div class="wrap">

  <div class="wheel-panel">
    <div class="wheel-stage">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>
    <button class="spin-btn" id="spinBtn">SORTEGGIA</button>
  </div>

  <div class="add-section">
    <p class="section-title">Aggiungi una voce</p>
    <div class="add-row">
      <input type="text" class="field" id="singleInput" placeholder="Scrivi una voce e premi Invio">
      <button class="btn gold" id="addSingleBtn">Aggiungi</button>
    </div>

    <p class="section-title">Aggiungi una lista (una voce per riga)</p>
    <div class="add-row">
      <textarea class="field" id="bulkInput" placeholder="Voce 1&#10;Voce 2&#10;Voce 3..."></textarea>
    </div>
    <div class="add-row">
      <button class="btn gold" id="addBulkBtn">Aggiungi tutte</button>
      <label class="file-label">📄 Carica file .md
        <input type="file" id="mdInput" accept=".md,text/markdown,text/plain">
      </label>
    </div>
  </div>

  <div class="lists">
    <div class="list-panel">
      <div class="list-panel-head">
        <h3>Ruota <span class="count" id="wheelCount">(0)</span></h3>
        <button class="btn danger" id="clearWheelBtn">svuota tutto</button>
      </div>
      <div class="list-items" id="wheelList"></div>
    </div>
    <div class="list-panel drawn">
      <div class="list-panel-head">
        <h3>Estratte <span class="count" id="drawnCount">(0)</span></h3>
        <button class="btn danger" id="clearDrawnBtn">svuota tutto</button>
      </div>
      <div class="list-items" id="drawnList"></div>
    </div>
  </div>

</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-card">
    <div class="tag">✦ ESTRATTA ✦</div>
    <div class="name" id="winnerName"></div>
    <button class="btn" id="winnerOk">OK</button>
  </div>
</div>

<script>
/* ---------------- Storage ---------------- */
const ENTRIES_KEY = 'wheel_entries';
const DRAWN_KEY = 'wheel_drawn';

function loadEntries(){ try{ return JSON.parse(localStorage.getItem(ENTRIES_KEY)) || []; }catch(e){ return []; } }
function saveEntries(arr){ localStorage.setItem(ENTRIES_KEY, JSON.stringify(arr)); }
function loadDrawn(){ try{ return JSON.parse(localStorage.getItem(DRAWN_KEY)) || []; }catch(e){ return []; } }
function saveDrawn(arr){ localStorage.setItem(DRAWN_KEY, JSON.stringify(arr)); }

let entries = loadEntries();
let drawn = loadDrawn();
let currentRotationDeg = 0;
let spinning = false;

/* ---------------- Rendering lists ---------------- */
function renderLists(){
  const wheelList = document.getElementById('wheelList');
  const drawnList = document.getElementById('drawnList');
  document.getElementById('wheelCount').textContent = '(' + entries.length + ')';
  document.getElementById('drawnCount').textContent = '(' + drawn.length + ')';

  wheelList.innerHTML = '';
  if(entries.length === 0){
    wheelList.innerHTML = '<div class="empty-hint">Nessuna voce. Aggiungine qualcuna qui sopra.</div>';
  } else {
    entries.forEach((val, idx)=>{
      const row = document.createElement('div');
      row.className = 'list-item';
      const span = document.createElement('span');
      span.textContent = val;
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '✕';
      x.onclick = ()=> removeEntry(idx);
      row.appendChild(span); row.appendChild(x);
      wheelList.appendChild(row);
    });
  }

  drawnList.innerHTML = '';
  if(drawn.length === 0){
    drawnList.innerHTML = '<div class="empty-hint">Ancora nessuna estrazione.</div>';
  } else {
    drawn.forEach((val, idx)=>{
      const row = document.createElement('div');
      row.className = 'list-item';
      const span = document.createElement('span');
      span.textContent = val;
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '✕';
      x.onclick = ()=> removeDrawn(idx);
      row.appendChild(span); row.appendChild(x);
      drawnList.appendChild(row);
    });
  }
}

function removeEntry(idx){
  if(!confirm('Rimuovere "' + entries[idx] + '" dalla ruota?')) return;
  entries.splice(idx, 1);
  saveEntries(entries);
  renderLists();
  drawWheel();
}
function removeDrawn(idx){
  if(!confirm('Rimuovere "' + drawn[idx] + '" dalla lista estratti?')) return;
  drawn.splice(idx, 1);
  saveDrawn(drawn);
  renderLists();
}
document.getElementById('clearWheelBtn').onclick = ()=>{
  if(entries.length === 0) return;
  if(!confirm('Svuotare completamente la ruota? Questa azione non si può annullare.')) return;
  entries = [];
  saveEntries(entries);
  renderLists();
  drawWheel();
};
document.getElementById('clearDrawnBtn').onclick = ()=>{
  if(drawn.length === 0) return;
  if(!confirm('Svuotare completamente la lista degli estratti? Questa azione non si può annullare.')) return;
  drawn = [];
  saveDrawn(drawn);
  renderLists();
};

/* ---------------- Adding entries ---------------- */
function addEntries(list){
  const clean = list.map(s=>s.trim()).filter(s=>s.length>0);
  if(clean.length === 0) return;
  entries = entries.concat(clean);
  saveEntries(entries);
  renderLists();
  drawWheel();
}
document.getElementById('addSingleBtn').onclick = ()=>{
  const el = document.getElementById('singleInput');
  addEntries([el.value]);
  el.value = '';
  el.focus();
};
document.getElementById('singleInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('addSingleBtn').click(); }
});
document.getElementById('addBulkBtn').onclick = ()=>{
  const el = document.getElementById('bulkInput');
  const lines = el.value.split(/\r?\n/);
  addEntries(lines);
  el.value = '';
};
document.getElementById('mdInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const lines = reader.result.split(/\r?\n/).map(line=>{
      return line
        .replace(/^\s*#{1,6}\s*/, '')
        .replace(/^\s*[-*+]\s+/, '')
        .replace(/^\s*\d+[\.\)]\s+/, '')
        .replace(/^\s*>\s?/, '')
        .trim();
    });
    addEntries(lines);
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---------------- Wheel drawing ---------------- */
function themeColor(varName){
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function drawWheel(){
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const cx = size/2, cy = size/2;
  const radius = size/2 - 10;
  ctx.clearRect(0,0,size,size);

  const colorA = themeColor('--leather-light');
  const colorB = themeColor('--parchment');
  const brass = themeColor('--brass');
  const brassBright = themeColor('--brass-bright');
  const brassDark = themeColor('--brass-dark');
  const inkOnLeather = themeColor('--ink');
  const inkOnParchment = '#241a10';

  const n = entries.length;

  if(n === 0){
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = colorA;
    ctx.fill();
    ctx.lineWidth = 4; ctx.strokeStyle = brass; ctx.stroke();
    ctx.fillStyle = inkOnLeather;
    ctx.font = '600 15px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Aggiungi voci', cx, cy - 6);
    ctx.fillText('per iniziare', cx, cy + 16);
    drawHub(ctx, cx, cy, brassBright, brass, brassDark);
    return;
  }

  const anglePerSlice = (Math.PI*2) / n;

  for(let i=0; i<n; i++){
    const start = -Math.PI/2 + i*anglePerSlice;
    const end = start + anglePerSlice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? colorA : colorB;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = brass;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + anglePerSlice/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = i % 2 === 0 ? inkOnLeather : inkOnParchment;
    const fontSize = n > 20 ? 10 : n > 12 ? 12 : 14;
    ctx.font = '600 ' + fontSize + 'px "Space Grotesk", sans-serif';
    let label = entries[i];
    const maxChars = n > 20 ? 12 : n > 12 ? 16 : 20;
    if(label.length > maxChars) label = label.slice(0, maxChars-1) + '…';
    ctx.fillText(label, radius - 12, 4);
    ctx.restore();
  }

  drawHub(ctx, cx, cy, brassBright, brass, brassDark);
}

function drawHub(ctx, cx, cy, bright, mid, dark){
  const r = 26;
  const grd = ctx.createRadialGradient(cx-8, cy-8, 4, cx, cy, r);
  grd.addColorStop(0, bright);
  grd.addColorStop(0.5, mid);
  grd.addColorStop(1, dark);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = grd;
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.stroke();
}

/* ---------------- Spin logic ---------------- */
function spin(){
  if(spinning) return;
  if(entries.length === 0){
    alert('Aggiungi almeno una voce prima di sorteggiare.');
    return;
  }
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const n = entries.length;
  const winnerIndex = Math.floor(Math.random() * n);
  const anglePerSliceDeg = 360 / n;
  const sliceCenter = winnerIndex * anglePerSliceDeg + anglePerSliceDeg/2;
  const jitterMax = anglePerSliceDeg * 0.3;
  const jitter = (Math.random()*2 - 1) * jitterMax;
  const desiredMod = ((360 - (sliceCenter + jitter)) % 360 + 360) % 360;

  const currentMod = ((currentRotationDeg % 360) + 360) % 360;
  const delta = ((desiredMod - currentMod) % 360 + 360) % 360;
  const fullSpins = 5 + Math.floor(Math.random()*3); // 5-7 full turns
  const finalRotation = currentRotationDeg + fullSpins*360 + delta;

  const canvas = document.getElementById('wheelCanvas');
  canvas.style.transition = 'transform 4.2s cubic-bezier(0.12,0.67,0.1,1)';
  canvas.style.transform = 'rotate(' + finalRotation + 'deg)';
  currentRotationDeg = finalRotation;

  const onDone = ()=>{
    canvas.removeEventListener('transitionend', onDone);
    finishSpin(winnerIndex);
  };
  canvas.addEventListener('transitionend', onDone);
  // fallback in case transitionend doesn't fire
  setTimeout(()=>{
    if(spinning) finishSpin(winnerIndex);
  }, 4500);
}

let spinFinished = false;
function finishSpin(winnerIndex){
  if(spinFinished) return; // guard against double-fire (transitionend + fallback)
  spinFinished = true;

  const winnerName = entries[winnerIndex];
  showWinner(winnerName);

  entries.splice(winnerIndex, 1);
  drawn.push(winnerName);
  saveEntries(entries);
  saveDrawn(drawn);
  renderLists();

  const canvas = document.getElementById('wheelCanvas');
  canvas.style.transition = 'none';
  canvas.style.transform = 'rotate(0deg)';
  currentRotationDeg = 0;
  drawWheel();
  // eslint-disable-next-line no-unused-expressions
  canvas.offsetHeight; // force reflow
  setTimeout(()=>{ canvas.style.transition = ''; }, 60);

  spinning = false;
  spinFinished = false;
  document.getElementById('spinBtn').disabled = false;
}

function showWinner(name){
  document.getElementById('winnerName').textContent = name;
  document.getElementById('winnerOverlay').classList.add('open');
}
document.getElementById('winnerOk').onclick = ()=>{
  document.getElementById('winnerOverlay').classList.remove('open');
};

document.getElementById('spinBtn').onclick = spin;

/* ---------------- Theme toggle ---------------- */
function updateThemeIcon(){
  document.getElementById('themeToggle').textContent = getTheme() === 'dark' ? '🌙' : '☀️';
}
document.getElementById('themeToggle').onclick = ()=>{
  toggleTheme();
  updateThemeIcon();
  drawWheel();
};
updateThemeIcon();

/* ---------------- Init ---------------- */
renderLists();
drawWheel();

/* ---------------- Service worker (offline) ---------------- */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
